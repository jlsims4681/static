<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole // UV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #ff4400;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --card-bg: #111;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--text);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .logo-text {
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent);
            font-size: 1.2rem;
        }

        /* Sidebar Search */
        .search-container {
            margin-bottom: 30px;
        }

        #url-input {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 8px;
            color: var(--accent);
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #url-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 68, 0, 0.2);
        }

        .sidebar-nav {
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #888;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #151515;
            color: #fff;
        }

        .nav-item i { color: var(--accent); width: 20px; text-align: center; }

        /* Main Display Area */
        .main-view {
            flex-grow: 1;
            position: relative;
            background: var(--bg);
            overflow-y: auto;
        }

        .content-container {
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-header {
            color: var(--accent);
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 40px 0 20px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px 15px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .app-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .app-card i { font-size: 2.2rem; margin-bottom: 12px; display: block; }
        .app-card span { font-size: 0.9rem; color: #eee; font-weight: 500; }

        /* The Proxy Frame */
        #content-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none; /* Hidden by default */
            background: #fff;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-section" onclick="showHome()">
            <div class="logo-text">VOID</div>
        </div>

        <div class="search-container">
            <form id="proxy-form">
                <input type="text" id="url-input" placeholder="Enter URL..." autocomplete="off">
            </form>
        </div>

        <div class="sidebar-nav">
            <div class="nav-item active" onclick="showHome()">
                <i class="fas fa-th-large"></i> Dashboard
            </div>
            <div class="nav-item" onclick="launchApp('https://poki.com')">
                <i class="fas fa-gamepad"></i> Games
            </div>
            <div class="nav-item" onclick="launchApp('https://discord.com')">
                <i class="fab fa-discord"></i> Discord
            </div>
            <div class="nav-item" onclick="launchApp('https://youtube.com')">
                <i class="fab fa-youtube"></i> YouTube
            </div>
        </div>

        <div class="nav-item" style="margin-top: auto;" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Reset Session
        </div>
    </div>

    <div class="main-view">
        <div id="home-view" class="content-container">
            
            <div class="section-header">Applications</div>
            <div class="grid">
                <div class="app-card" onclick="launchApp('https://youtube.com')">
                    <i class="fab fa-youtube" style="color: #ff0000;"></i>
                    <span>YouTube</span>
                </div>
                <div class="app-card" onclick="launchApp('https://discord.com')">
                    <i class="fab fa-discord" style="color: #5865F2;"></i>
                    <span>Discord</span>
                </div>
                <div class="app-card" onclick="launchApp('https://spotify.com')">
                    <i class="fab fa-spotify" style="color: #1DB954;"></i>
                    <span>Spotify</span>
                </div>
                <div class="app-card" onclick="launchApp('https://geforce-now.com')">
                    <i class="fas fa-desktop" style="color: #76B900;"></i>
                    <span>GFN</span>
                </div>
            </div>

            <div class="section-header">Games Area</div>
            <div class="grid">
                <div class="app-card" onclick="launchApp('https://poki.com')">
                    <i class="fas fa-bolt" style="color: #FFD700;"></i>
                    <span>Poki</span>
                </div>
                <div class="app-card" onclick="launchApp('https://shredders.pages.dev/')">
                    <i class="fas fa-snowboarding" style="color: #00D1FF;"></i>
                    <span>Shredders</span>
                </div>
                <div class="app-card" onclick="launchApp('https://crazygames.com')">
                    <i class="fas fa-fire" style="color: #ff4400;"></i>
                    <span>CrazyGames</span>
                </div>
                <div class="app-card" onclick="launchApp('https://geometrydash.io')">
                    <i class="fas fa-ghost" style="color: #a020f0;"></i>
                    <span>G-Dash</span>
                </div>
            </div>

        </div>

        <iframe id="content-frame" allow="fullscreen; gamepad; autoplay;"></iframe>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const frame = document.getElementById('content-frame');
        const home = document.getElementById('home-view');
        const input = document.getElementById('url-input');

        async function launchApp(url) {
            if (!url) return;
            
            // Hide dashboard, show iframe
            home.classList.add('hidden');
            frame.style.display = 'block';

            // UV Init
            if ('serviceWorker' in navigator) {
                await window.navigator.serviceWorker.register('./sw.js', {
                    scope: __uv$config.prefix
                });
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            }
        }

        function showHome() {
            frame.style.display = 'none';
            frame.src = 'about:blank';
            home.classList.remove('hidden');
        }

        document.getElementById('proxy-form').onsubmit = (e) => {
            e.preventDefault();
            let url = input.value.trim();
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            launchApp(url);
        };
    </script>
</body>
</html>
