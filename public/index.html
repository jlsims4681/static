<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole // UV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #ff4400;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --card-bg: #111;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--text);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .logo-text {
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .search-container { margin-bottom: 25px; }

        #url-input {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 8px;
            color: var(--accent);
            outline: none;
            box-sizing: border-box;
        }

        .nav-label {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #888;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #151515;
            color: #fff;
        }

        .nav-item i { color: var(--accent); width: 20px; text-align: center; }

        /* Content Area */
        .main-view {
            flex-grow: 1;
            position: relative;
            background: var(--bg);
            overflow-y: auto;
        }

        .page {
            display: none;
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .page.active { display: block; }

        .section-header {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px 15px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .app-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .app-card i { font-size: 2.2rem; margin-bottom: 12px; display: block; }

        /* Frame */
        #content-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-section" onclick="switchPage('home')">
            <div class="logo-text">VOID</div>
        </div>

        <div class="search-container">
            <form id="proxy-form">
                <input type="text" id="url-input" placeholder="Quick Search..." autocomplete="off">
            </form>
        </div>

        <div class="nav-label">Explore</div>
        <div class="nav-item active" onclick="switchPage('home')">
            <i class="fas fa-home"></i> Home
        </div>
        <div class="nav-item" onclick="switchPage('apps')">
            <i class="fas fa-th"></i> Apps
        </div>
        <div class="nav-item" onclick="switchPage('games')">
            <i class="fas fa-gamepad"></i> Games
        </div>

        <div class="nav-item" style="margin-top: auto;" onclick="location.reload()">
            <i class="fas fa-redo"></i> Reset
        </div>
    </div>

    <div class="main-view">
        <div id="home" class="page active">
            <div class="section-header">Welcome to the Void</div>
            <p style="color: #666;">Use the sidebar to explore applications or enter a URL above.</p>
        </div>

        <div id="apps" class="page">
            <div class="section-header">Applications</div>
            <div class="grid">
                <div class="app-card" onclick="launchApp('https://youtube.com')">
                    <i class="fab fa-youtube" style="color: #ff0000;"></i>
                    <span>YouTube</span>
                </div>
                <div class="app-card" onclick="launchApp('https://discord.com')">
                    <i class="fab fa-discord" style="color: #5865F2;"></i>
                    <span>Discord</span>
                </div>
                <div class="app-card" onclick="launchApp('https://spotify.com')">
                    <i class="fab fa-spotify" style="color: #1DB954;"></i>
                    <span>Spotify</span>
                </div>
            </div>
        </div>

        <div id="games" class="page">
            <div class="section-header">Games</div>
            <div class="grid">
                <div class="app-card" onclick="launchApp('https://poki.com')">
                    <i class="fas fa-bolt" style="color: #FFD700;"></i>
                    <span>Poki</span>
                </div>
                <div class="app-card" onclick="launchApp('https://shredders.pages.dev/')">
                    <i class="fas fa-snowboarding" style="color: #00D1FF;"></i>
                    <span>Shredders</span>
                </div>
                <div class="app-card" onclick="launchApp('https://geometrydash.io')">
                    <i class="fas fa-cube" style="color: #a020f0;"></i>
                    <span>G-Dash</span>
                </div>
            </div>
        </div>

        <iframe id="content-frame" allow="fullscreen; gamepad; autoplay;"></iframe>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const frame = document.getElementById('content-frame');
        const input = document.getElementById('url-input');

        function switchPage(pageId) {
            // Hide the iframe if switching pages
            frame.style.display = 'none';
            frame.src = 'about:blank';
            
            // Toggle active class on pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Toggle active class on nav items
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function launchApp(url) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            frame.style.display = 'block';

            if ('serviceWorker' in navigator) {
                await window.navigator.serviceWorker.register('./sw.js', { scope: __uv$config.prefix });
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            }
        }

        document.getElementById('proxy-form').onsubmit = (e) => {
            e.preventDefault();
            let url = input.value.trim();
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            launchApp(url);
        };
    </script>
</body>
</html>
